    <style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Roboto Condensed', sans-serif;
        background-color: #0a0a0a;
        overflow: hidden;
    }

    #DisplayContent {
        position: relative;
        height: 100vh;
        width: 100%;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    #PlayerDisplay {
        position: relative;
        height: 100%;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    /* Fake Player Styles */
    .fake-player-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        overflow: hidden;
    }

    .fake-player-container::before {
        content: '';
        position: absolute;
        top: -10px;
        left: -10px;
        right: -10px;
        bottom: -10px;
                background-image: url('https://image.tmdb.org/t/p/original/VuukZLgaCrho2Ar8Scl9HtV3yD.jpg');
                background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        animation: slowZoom 25s ease-in-out infinite alternate;
        z-index: 0;
    }

    .fake-player-container::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(16, 16, 23, 0.4) 50%, rgba(0, 0, 0, 0.6) 100%);
        z-index: 1;
    }

    .fake-player-container > * {
        position: relative;
        z-index: 2;
    }

    @keyframes slowZoom {
        0% { transform: scale(1); }
        100% { transform: scale(1.08); }
    }

    .play-button-overlay {
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        border: none;
        background: transparent;
        order: 1;
    }

    .play-button-overlay:hover {
        transform: scale(1.1);
    }

    .play-button-overlay:focus {
        outline: 3px solid rgba(28, 173, 221, 0.8);
        outline-offset: 5px;
    }

    .play-button-circle {
        width: 100px;
        height: 100px;
        background: rgba(28, 173, 221, 0.9);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 30px rgba(28, 173, 221, 0.5);
        position: relative;
    }

    .play-button-circle::after {
        content: '';
        position: absolute;
        width: 120px;
        height: 120px;
        border: 2px solid rgba(28, 173, 221, 0.3);
        border-radius: 50%;
        animation: pulse 2s infinite;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.3); opacity: 0; }
    }

    .play-button-circle i {
        font-size: 40px;
        color: white;
        margin-left: 5px;
    }

    .video-title-overlay {
        position: relative;
        color: white;
        text-align: center;
        text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.9), 0 0 20px rgba(0, 0, 0, 0.7);
        max-width: 80%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        padding: 20px 30px 10px;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        order: 2;
    }

    .video-title-overlay h1 {
        font-size: 1.8rem;
        margin: 0 0 10px 0;
        font-weight: 600;
        line-height: 1.4;
    }

    .video-title-overlay .watching-label {
        font-size: 0.65em;
        font-weight: 400;
        opacity: 0.85;
        display: block;
        margin-bottom: 5px;
        letter-spacing: 0.5px;
    }

    .video-title-overlay .video-name {
        font-size: 1em;
        font-weight: 700;
        display: block;
        text-transform: capitalize;
    }

    .video-title-overlay p {
        font-size: 1rem;
        margin: 0;
        opacity: 0.9;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
    }

    .video-title-overlay .language-flags {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
    }

    .video-title-overlay .language-flag-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .video-title-overlay .language-flags img {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .video-title-overlay .language-name {
        font-size: 0.9em;
        font-weight: 600;
    }

    .video-title-overlay .separator { opacity: 0.7; }

    .video-title-overlay .online-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-weight: 600;
        color: #4ade80;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .video-title-overlay .online-badge::before {
        content: '';
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        animation: blink 2s infinite;
        box-shadow: 0 0 10px #4ade80;
    }

    @keyframes blink {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(0.8); }
    }

    .video-title-overlay .server-count {
        font-weight: 600;
        color: #38bdf8;
    }

    /* ===== V4 Floating Selectors (Glass Morphism) ===== */
    .floating-selectors {
        position: absolute;
        top: 1.5rem;
        left: 1.5rem;
        z-index: 9999;
        display: flex;
        gap: 10px;
    }

    .selector-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0.75rem 1rem;
        border-radius: 0.5rem;
        background-color: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        cursor: pointer;
        transition: all 0.2s;
        color: rgba(255, 255, 255, 0.9);
        font-family: 'Roboto Condensed', sans-serif;
        font-size: 14px;
        font-weight: 500;
    }

    .selector-btn:hover {
        background-color: rgba(0, 0, 0, 0.55);
        border-color: rgba(28, 173, 221, 0.5);
    }

    .selector-btn i {
        font-size: 1rem;
    }

    .selector-btn img {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        object-fit: cover;
    }

    /* Dropdown panels */
    .selector-dropdown {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 0.5rem;
        min-width: 200px;
        max-height: 300px;
        overflow-y: auto;
        background-color: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 0.5rem;
        border: 2px solid rgba(28, 173, 221, 0.6);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        z-index: 99999;
        display: none;
    }

    .selector-dropdown.open {
        display: block;
        animation: dropIn 0.2s ease-out;
    }

    @keyframes dropIn {
        from { opacity: 0; transform: translateY(-8px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .selector-dropdown::-webkit-scrollbar {
        width: 6px;
    }

    .selector-dropdown::-webkit-scrollbar-thumb {
        background: rgba(28, 173, 221, 0.5);
        border-radius: 3px;
    }

    .dropdown-option {
        display: flex;
        align-items: center;
        width: 100%;
        padding: 0.75rem 1rem;
        border: none;
        background: transparent;
        color: rgba(255, 255, 255, 0.9);
        cursor: pointer;
        transition: background-color 0.2s;
        text-align: left;
        font-family: 'Roboto Condensed', sans-serif;
        font-size: 14px;
        gap: 10px;
    }

    .dropdown-option:first-child {
        border-top-left-radius: 0.5rem;
        border-top-right-radius: 0.5rem;
    }

    .dropdown-option:last-child {
        border-bottom-left-radius: 0.5rem;
        border-bottom-right-radius: 0.5rem;
    }

    .dropdown-option:hover {
        background-color: rgba(28, 173, 221, 0.15);
    }

    .dropdown-option.active {
        background-color: rgba(28, 173, 221, 0.25);
        border-left: 3px solid rgba(28, 173, 221, 0.8);
    }

    .dropdown-option img {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        object-fit: cover;
    }

    .dropdown-option .server-icon {
        width: 18px;
        height: 18px;
        border-radius: 3px;
    }

    /* iframe container */
    .iframe-container {
        position: relative;
        width: 100%;
        height: 100%;
        display: none;
    }

    .iframe-container.active {
        display: block;
    }

    #iframePlayer {
        width: 100%;
        height: 100%;
        border: none;
    }

    /* Background wallpaper for player mode */
    .player-bg {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
                background: linear-gradient(rgba(16, 16, 23, 0.71), #000000), url('https://image.tmdb.org/t/p/original/VuukZLgaCrho2Ar8Scl9HtV3yD.jpg');
                background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: -1;
    }

    /* Decryption Loader */
    .decryption-loader {
        position: fixed;
        top: 0;
        left: 0;

    async function decryptAES(encryptedBase64, aesKey) {
        try {
            const raw = Uint8Array.from(atob(encryptedBase64), c => c.charCodeAt(0));
            const iv = raw.slice(0, 16);
            const ciphertext = raw.slice(16);
            const key = await crypto.subtle.importKey('raw', aesKey.slice(0, 32), { name: 'AES-CBC' }, false, ['decrypt']);
            const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: iv }, key, ciphertext);
            return new TextDecoder().decode(decrypted);
        } catch(e) {
            return null;
        }
    }
